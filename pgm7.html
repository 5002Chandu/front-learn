<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reversed</title>
</head>
<body>
    <script>
        let num= 1234567;
        let rev =parseInt(num.toString().split("").reverse().join(""));
        console.log("Reversed number is:",rev)
    </script>
</body>
</html>
