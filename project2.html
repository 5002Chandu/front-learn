<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mood Music Player</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #207215, #9e2f86);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    h1 {
      color: #9381bd;
    }
    select {
      padding: 0.5rem;
      font-size: 1rem;
      margin-bottom: 1rem;
      border-radius: 6px;
    }
    audio {
      margin-top: 1rem;
      width: 300px;
    }
  </style>
</head>
<body>
  <h1>🎶 Mood Music Player</h1>
  <label for="mood">Select your mood:</label>
  <select id="mood" onchange="playMoodMusic()">
    <option value="">--Choose Mood--</option>
    <option value="happy">😊 Happy</option>
    <option value="sad">😢 Sad</option>
    <option value="relaxed">😌 Relaxed</option>
    <option value="energetic">⚡ Energetic</option>
  </select>

  <audio id="player" controls>
    <source id="audioSource" src="" type="audio/mpeg" />
    Your browser does not support the audio element.
  </audio>

  <script>
    const player = document.getElementById('player');
    const audioSource = document.getElementById('audioSource');

    const moodTracks = {
      happy: 'https://open.spotify.com/track/1pRXl5XAwEZUcsTS9BqNR6?si=e0d23e22228a4444',
      sad:'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3',
      relaxed: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3',
      energetic: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3'
    };

    function playMoodMusic() {
      const mood = document.getElementById('mood').value;
      if (mood && moodTracks[mood]) {
        audioSource.src = moodTracks[mood];
        player.load();
        player.play();
      } else {
        player.pause();
        audioSource.src = '';
      }
    }
  </script>
</body>
</html>
