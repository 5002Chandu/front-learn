<!DOCTYPE html>
<html lang="en">
<head>
    <title>Add function Example</title>
</head>
<body>
    <h2>Add Function Example </h2>
    <button onclick="showsum()">Add 5 + 3</button>
    <p id="sumresult"></p>
    <script>
        function add(a,b){
            return a + b;
        }
        function showsum(){
            let sum = add(5 ,3);
            document.getElementById("sumresult").innerText="sum:"+sum;
        }
    </script>
</body>
</html>
